{% extends "core/base.html" %}

{% block title %}Login - LMS{% endblock %}

{% block content %}
<div class="card">
    <h2>Login</h2>

    {% if form.errors %}
        <div class="message">
            Username atau password salah.
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label>Username</label>
        {{ form.username }}

        <br><br>

        <label>Password</label>
        {{ form.password }}

        <br><br>

        <button class="btn" type="submit">Login</button>
    </form>
</div>
{% endblock %}
